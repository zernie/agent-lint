# Feedback Loop CI — copy this to your repo's .github/workflows/
#
# Runs lint, type-check, tests, and CLAUDE.md validation.
# Customize the steps to match your project's toolchain.

name: Feedback Loop

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  feedback-loop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # Step 1: Lint
      - name: Lint
        run: npx eslint .

      # Step 2: Type check (TypeScript projects)
      - name: Type check
        run: npx tsc --noEmit

      # Step 3: Tests
      - name: Tests
        run: npm test

      # Step 4: CLAUDE.md validation
      - name: Validate CLAUDE.md
        run: npx agent-lint validate
